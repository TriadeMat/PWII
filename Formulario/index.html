<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Talentos - Cadastro e Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>

<body>
    <div class="container">
        <div class="main-container">

            <!-- SEÇÃO DE CADASTRO (EM CIMA) -->
            <div class="card-custom">
                <h2>Ficha Cadastral</h2>
                <p class="instrucoes">Preencha os campos abaixo para entrar em nosso banco de talentos.</p>

                <form action="process.php" method="post" id="formCadastro">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" id="nome nomeDigitado" class="form-control"
                            placeholder="Seu nome">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" id="emailDigitado" class="form-control"
                            placeholder="exemplo@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Endereço</label>
                        <input type="text" name="endereco" id="enderecoDigitado" class="form-control"
                            placeholder="Rua, Número, Bairro">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"
                        onclick="return validarFormulario()">Cadastrar</button>
                </form>
            </div>

            <!-- SEÇÃO DE CONSULTA (EMBAIXO) -->
            <div class="card-custom">
                <h2>Buscar Cadastro</h2>
                <p class="instrucoes">Digite o e-mail cadastro para localizar seus dados no sistema.</p>

                <form id="consultaForm">
                    <div class="mb-3">
                        <label for="emailBusca" class="form-label">E-mail de Busca</label>
                        <input type="email" id="emailBusca" class="form-control" placeholder="exemplo@dominio.com"
                            required>
                    </div>
                    <button type="submit" id="btnConsultar" class="btn btn-outline-primary w100">Consultar
                        Dados</button>
                </form>
                <div id="tabelaResultado" class="mt-4">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover table-sm">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>E-mail</th>
                                    <th>endereço</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td id="col-id"></td>
                                    <td id="col-nome"></td>
                                    <td id="col-email"></td>
                                    <td id="col-endereco"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        //foco inicial no nome
        document.getElementById("nomeDigitado").focus();

        //Validação do Cadastro
        function validarFormulario() {
            let nome = document.getElementById("nomeDigitado");
            let email = document.getElementById("emailDigitado");
            let endereco = document.getElementById("enderecoDigitado");

            [nome, email, endereco].forEach(el =>el.style.boxShadow = "none");

            if (nome.value.trim()==="") {
                alert("Por favor, preencha o campo de nome.");
                nome.style.boxShadow = "0 0 5px #ffc107";
                nome.focus();
                return false;
            }
            if (email.value.trim() === "") {
                alert("Por favor, preencha o campo de e-mail.");
                email.style.boxShadow = "0 0 5px #ffc107";
                email.focus();
                return false;
            }
            return false;
        }

         // Lógica da Consulta
         function popularTabela(json) {
            if (!json.sucesso || !json.cadastro){
                alert("Nenhuma registro encontrado")
            }
         }
    </script>
</body>

</html>
